<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatApp</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="placeholder-page">
  <div class="avatar-circle">
    <img id="me-photo" alt="Your profile picture" />
    <svg class="avatar-placeholder" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
  </div>
  <h1 id="welcome-msg">You're logged in 🎉</h1>
  <p>This is a placeholder. The full WhatsApp-style chat interface (sidebar, conversations, message bubbles) gets built in Step 2.</p>
  <button class="btn-secondary" id="logout-btn">Log Out</button>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module">
  import { auth, db } from "./firebase-config.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const welcomeMsg = document.getElementById("welcome-msg");
  const mePhoto = document.getElementById("me-photo");
  const placeholder = document.querySelector(".avatar-placeholder");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      const data = snap.data();
      welcomeMsg.textContent = `Welcome, ${data.displayName} 🎉`;
      if (data.photoURL) {
        mePhoto.src = data.photoURL;
        mePhoto.style.display = "block";
        placeholder.style.display = "none";
      }
    }
  });

  document.getElementById("logout-btn").addEventListener("click", () => {
    signOut(auth).then(() => (window.location.href = "index.html"));
  });
</script>
</body>
</html>
