<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatApp — Log in or Sign up</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.04 2 11c0 2.62 1.27 4.97 3.31 6.62-.05.93-.43 2.36-1.31 3.88 1.74-.17 3.34-.85 4.6-1.65A11.6 11.6 0 0 0 12 20c5.52 0 10-4.04 10-9s-4.48-9-10-9Z" fill="#00A884"/>
      </svg>
      <span>ChatApp</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" type="button">Log In</button>
      <button class="auth-tab" data-tab="register" type="button">Sign Up</button>
    </div>

    <!-- ===================== LOGIN FORM ===================== -->
    <form id="login-form" class="auth-form active" autocomplete="off">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="login-password">Password</label>
        <div class="field-input-wrap">
          <input type="password" id="login-password" placeholder="Enter your password" required />
          <button type="button" class="toggle-visibility" data-target="login-password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="login-msg" class="auth-form-msg"></div>

      <button type="submit" class="btn-primary" id="login-submit">
        <span class="label">Log In</span>
        <span class="spinner"></span>
      </button>
    </form>

    <!-- ===================== REGISTER FORM ===================== -->
    <form id="register-form" class="auth-form" autocomplete="off">

      <div class="avatar-upload">
        <label class="avatar-circle" for="register-photo">
          <img id="avatar-preview" alt="Profile picture preview" />
          <svg class="avatar-placeholder" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
          <span class="avatar-camera">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="#04201A"><path d="M9 3 7.17 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9Zm3 14a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/></svg>
          </span>
        </label>
        <input type="file" id="register-photo" accept="image/*" />
        <div class="avatar-upload-text">
          <strong>Profile photo</strong>
          <span>Optional — you can add this later</span>
        </div>
      </div>

      <div class="field">
        <label for="register-name">Display Name</label>
        <input type="text" id="register-name" placeholder="e.g. Lakmina" required />
      </div>

      <div class="field">
        <label for="register-username">Username</label>
        <div class="field-input-wrap">
          <input type="text" id="register-username" placeholder="e.g. lakmina" required />
        </div>
        <div class="field-hint">We'll add 4 random numbers to the end to keep it unique — letters, numbers and underscores only.</div>
        <div class="username-preview" id="username-preview">
          <span class="username-preview-label">Your username</span>
          <span class="username-preview-value" id="username-preview-value">—</span>
          <button type="button" class="regen-btn" id="regen-username-btn" title="Get a different number" aria-label="Get a different number">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
        </div>
        <div id="username-status" class="username-status"></div>
        <div id="username-error" class="field-error"></div>
      </div>

      <div class="field">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="register-password">Password</label>
        <div class="field-input-wrap">
          <input type="password" id="register-password" placeholder="At least 6 characters" minlength="6" required />
          <button type="button" class="toggle-visibility" data-target="register-password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="register-msg" class="auth-form-msg"></div>

      <button type="submit" class="btn-primary" id="register-submit">
        <span class="label">Create Account</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="auth-footnote">By continuing, you agree this is a personal project for learning purposes.</div>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
